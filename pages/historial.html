<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VaxMinder – Historial</title>
    <link rel="stylesheet" href="../css/styles.css" />
  </head>
  <body>
    <div class="app-wrapper">
      <aside class="sidebar">
        <div class="sidebar-logo">
          <div class="logo-icon">💉</div>
          <div class="logo-text">VaxMinder</div>
        </div>
        <nav class="sidebar-nav">
          <span class="nav-section-label">Principal</span>
          <a class="nav-item" href="dashboard.html"
            ><span class="nav-icon"></span> Dashboard</a
          >
          <span class="nav-section-label">Vacunacion</span>
          <a class="nav-item" href="vacunas.html"
            ><span class="nav-icon"></span> Registrar Vacuna</a
          >
          <a class="nav-item" href="historial.html"
            ><span class="nav-icon"></span> Historial</a
          >
          <span class="nav-section-label">Recordatorios</span>
          <a class="nav-item" href="alertas.html"
            ><span class="nav-icon"></span> Alertas<span
              id="alert-badge"
              class="badge badge-danger"
              style="
                margin-left: auto;
                display: none;
                font-size: 11px;
                padding: 2px 7px;
              "
              >0</span
            ></a
          >
          <span class="nav-section-label">Catalogos</span>
          <a class="nav-item" href="centros.html"
            ><span class="nav-icon"></span> Centros Medicos</a
          >
          <span class="nav-section-label">Documentos</span>
          <a class="nav-item" href="carnet.html"
            ><span class="nav-icon"></span> Carnet Digital</a
          >
        </nav>
        <div class="sidebar-user">
          <div class="avatar" id="sidebar-avatar">U</div>
          <div class="user-info">
            <div class="user-name" id="sidebar-user-name">Usuario</div>
            <div class="user-role">Paciente</div>
          </div>
          <button class="btn-logout" onclick="logout()" title="Cerrar sesion">
            Salir
          </button>
        </div>
      </aside>

      <div class="main-content">
        <div class="topbar">
          <div class="topbar-title">Historial de Vacunacion</div>
          <div class="topbar-actions">
            <a href="vacunas.html" class="btn btn-accent btn-sm"
              >➕ Registrar Vacuna</a
            >
          </div>
        </div>

        <div class="page-body">
          <div class="card mb-3" style="padding: 16px 20px">
            <div
              style="
                display: flex;
                align-items: center;
                gap: 12px;
                flex-wrap: wrap;
              "
            >
              <div class="search-bar" style="flex: 1; min-width: 180px">
                <span class="search-icon">🔍</span>
                <input type="text" id="buscar" placeholder="Buscar vacuna..." />
              </div>
              <select
                class="form-control"
                id="filtro-estado"
                style="width: auto; min-width: 150px"
              >
                <option value="">Todos los estados</option>
                <option value="completa">Completa</option>
                <option value="pendiente">Pendiente</option>
                <option value="vencida">Vencida</option>
              </select>
            </div>
          </div>

          <div class="card">
            <div id="tabla-historial"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="modal-overlay" id="modal-detalle">
      <div class="modal">
        <div class="modal-header">
          <div class="modal-title">Detalle del registro</div>
          <button class="modal-close" onclick="closeModal('modal-detalle')">
            ✕
          </button>
        </div>
        <div class="modal-body" id="modal-detalle-body"></div>
        <div class="modal-footer">
          <button class="btn btn-ghost" onclick="closeModal('modal-detalle')">
            Cerrar
          </button>
          <button class="btn btn-danger btn-sm" id="btn-eliminar">
            🗑 Eliminar
          </button>
        </div>
      </div>
    </div>

    <div id="toast-container"></div>
    <script src="../js/core.js"></script>
    <script src="../js/usuarios.repo.js"></script>
    <script src="../js/session.repo.js"></script>
    <script src="../js/vacunas-catalogo.repo.js"></script>
    <script src="../js/centros-medicos.repo.js"></script>
    <script src="../js/alertas.repo.js"></script>
    <script src="../js/registro-vacunacion.repo.js"></script>
    <script src="../js/historial-pdf.repo.js"></script>
    <script src="../js/storage.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/historial.js"></script>
  </body>
</html>
